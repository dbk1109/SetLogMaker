<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" viewport-fit="cover" />
  <title>︵‿˚̣̣̣͙⋆⁺𝐦𝐰 𝐬𝐞𝐭 𝐥𝐨𝐠 𝐦𝐚𝐤𝐞𝐫⋆₊˚̣̣̣͙‿︵</title>
  <link rel="stylesheet" href="./css/mvp3.min.css">
  <script src="https://kit.fontawesome.com/c164f9c1fd.js" crossorigin="anonymous"></script>
</head>

<body>

  <section id="leftWrap">
    <div class="title">
      <h1>︵‿˚̣̣̣͙⋆⁺mw set log maker⋆₊˚̣̣̣͙‿︵</h1>
      <p>v3.52</p>
    </div>

    <div id="setting">
      <div class="options">
        <h2>환경 설정</h2>
        <div class="setting--wrap">
          <label class="options--time">
            <span class="label-text">24시간제로 보기</span>
            <input type="checkbox" id="timeFormatToggle">
            <span class="slider"></span>
          </label>
          <div class="options--title">
            <span class="label-text">타이틀 변경</span>
            <input type="text" name="titleText" id="titleTextChange" placeholder="💚💜">
          </div>
          <div class="options--save">
            <span class="label-text">저장/초기화</span>
            <div class="save--btns">
              <span id="autoSaveStatus">대기중</span>
              <button id="clearAllBtn" class="btn btn-grey">
                <i class="fa-solid fa-trash"></i>
                <span>초기화</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="users">
        <h2>유저 설정</h2>
        <div class="setting--wrap userClass">
          <div class="users--profile">
            <p>1번</p>
            <input type="file" id="profile-user1" class="profile-input" accept="image/*" hidden />
            <label for="profile-user1" class="users--profile__img"> + <br> 프로필 </label>
            <input type="text" class="users--profile__nickname" placeholder="닉네임 입력" />
          </div>
          <div class="users--profile">
            <p>2번</p>
            <input type="file" id="profile-user2" class="profile-input" accept="image/*" hidden />
            <label for="profile-user2" class="users--profile__img"> + <br> 프로필 </label>
            <input type="text" class="users--profile__nickname" placeholder="닉네임 입력" />
          </div>
        </div>
      </div>
    </div>

    <div id="timeBlocks">
      <div class="timeTitle">
        <h2>시간 블록</h2>
        <div class="indicator"> </div>
      </div>

      <div class="timeline">

        <div class="timeline--item">

          <div class="timeline--header">
            <span class="time-label">11:00</span>
          </div>

          <div id="timeline-user1" class="timeline--wrap">
            <div class="thumb " data-id="${slot.id}">
              <video src="./_video/KakaoTalk_Video_2026-05-12-00-04-06.mp4" muted playsinline></video>
              <button class="btn btn--delete_video" data-user="${user}" data-id="${slot.id}">
                <i class="fa-solid fa-trash"></i>
              </button>
              <label class="btn btn--upload">
                <input type="file" data-user="user1" data-index="${i}" accept="video/*" hidden />
                + add
              </label>
            </div>

            <input class="slot-text" data-index="${i}" placeholder="텍스트"></input>
          </div>
          
          <div id="timeline-user2" class="timeline--wrap">
            <div class="thumb empty" data-id="${slot.id}">
              <label class="btn btn--upload">
                <input type="file" data-user="user1" data-index="${i}" accept="video/*" hidden />
                + add
              </label>
            </div>

            <input class="slot-text" data-index="${i}" placeholder="텍스트"></input>
          </div>

        </div>

      </div>
    </div>
  </section>

  <section id="fullscreenWrap">
    <div id="visual">

      <div class="Menu">
        <div class="Menu--title">
          <div class="Menu--title__left">
            <i class="fa-solid fa-angle-left"></i>
          </div>

          <div class="Menu--title__middle">
            <div class="title--text">
              <p> 💚💜 </p>
              <i class="fa-solid fa-angle-down"></i>
            </div>
          </div>

          <div class="Menu--title__right">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <i class="fa-solid fa-message"></i>
          </div>

        </div>

        <div class="Menu--dots-wrapper">
          <div class="Menu--dots"></div>
        </div>

      </div>

      <div class="Videos">

        <div id="user1" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./assets/profile.webp'" />

            <p class="nickname">
              user1
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-solid fa-ellipsis"></i>
          </div>

        </div>

        <div id="user2" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./assets/profile.webp'" />

            <p class="nickname">
              user2
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-regular fa-heart"></i>
          </div>

        </div>

      </div>

      <div class="Last">
      </div>

    </div>

    <div class="controller">

      <button id="floatingMenuBtn" class="btn btn-floating-menu">
        <i class="fa-solid fa-ellipsis"></i>
      </button>

      <div id="floatingDrawer" class="floating-drawer">

        <button id="playAll" class="btn btn-drawer">
          <i class="fa-solid fa-play"></i>
        </button>

        <button id="fullscreenBtn" class="btn btn-drawer">
          <i class="fa-solid fa-expand"></i>
        </button>

      </div>

    </div>

    <div id="playNotice" class="PlayNotice">
      <div class="PlayNotice--box">
        <i class="fa-solid fa-circle-exclamation"></i>
        <p> 재생이 시작되면 종료될 때까지 메뉴가 사라집니다. </p>
        <p>
          확인버튼을 누르기 전에 영상 녹화를 준비하시고,
          <br>
          나가려면 뒤로가기 제스처 또는 시스템 버튼을 사용하세요.
        </p>

        <button id="playNoticeConfirm" class="btn btn-white">
          확인
        </button>
      </div>
    </div>
    
    <div id="videoPreloader" class="video-preloader">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>재생 환경 최적화 중... (<span id="preloadProgress">0</span>%)</p>
      </div>
    </div>
  </section>

  <script>
    const scrollContainer = document.querySelector(".timeline");

    scrollContainer.addEventListener('wheel', (e) => {
      e.preventDefault(); // 기본 세로 스크롤 동작 막기
      scrollContainer.scrollLeft += e.deltaY; // 휠 이동값을 가로 스크롤에 더함
    });
  </script>
 
  <script src="./js/script2.js"></script>
  <script src="./js/controller2.js"></script>

</body>

</html>
