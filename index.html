<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" viewport-fit="cover"/>
  <title>SETLOG STYLE MAKER</title>
  <link rel="stylesheet" href="./css/style.min.css" />
  <script src="https://kit.fontawesome.com/02bd83a24e.js" crossorigin="anonymous"></script>
</head>

<body>
  <p class="version">V1.1.0</p>

  <section id="setting">
    <div class="SettingWrap">

      <div class="SettingUser" data-user="user1">
        <h2>USER 1</h2>
        <div class="SettingUser--profile">
          <label for="profile-user1" class="profile-upload">+</label>
          <input type="file" id="profile-user1" class="profile-input" accept="image/*" hidden />
          
          <input type="text" class="nickname-input" placeholder="닉네임 입력" />
          
          <label for="video-user1" class="btn btn-upload btn-blueviolet"> 영상 추가 </label>
          <input type="file" id="video-user1" class="video-input" accept="video/*" multiple hidden />
        </div>
        <div class="Timeline" id="timeline-user1"></div>
      </div>

      <div class="SettingUser" data-user="user2">
        <h2>USER 2</h2>
        <div class="SettingUser--profile">
          <label for="profile-user2" class="profile-upload">+</label>
          <input type="file" id="profile-user2" class="profile-input" accept="image/*" hidden />
          <input type="text" class="nickname-input" placeholder="닉네임 입력" />
          <label for="video-user2" class="btn btn-upload btn-blueviolet"> 영상 추가 </label>
          <input type="file" id="video-user2" class="video-input" accept="video/*" multiple hidden />
        </div>
        <div class="Timeline" id="timeline-user2"></div>
      </div>
      <!--<button id="openPreview" class="btn">
        새창열기
      </button>-->

    </div>
  </section>

  <section id="fullscreenWrap">
    <div id="visual">

      <div class="Menu">
        <div class="Menu--title">
          <div class="Menu--title__left">
            <i class="fa-solid fa-angle-left"></i>
          </div>

          <div class="Menu--title__middle">
            <label for="menu-toggle">
              <h1 id="menu-title">
                💚💜 <i class="fa-solid fa-angle-down"></i>
              </h1>
            </label>
          </div>

          <div class="Menu--title__right">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <i class="fa-solid fa-message"></i>
          </div>

        </div>

        <div class="Menu--dots">
          <span class="active"></span>
          <span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

      </div>

      <div class="Videos">

        <div id="user1" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./image/profile.webp'" />

            <p class="nickname">
              user1
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-solid fa-ellipsis"></i>
          </div>

        </div>

        <div id="user2" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./image/profile.webp'" />

            <p class="nickname">
              user2
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-regular fa-heart"></i>
          </div>

        </div>

      </div>

      <div class="Last">
      </div>
      
    </div>
    
    <div class="controller">

      <button id="floatingMenuBtn" class="floating-menu-btn">
        <i class="fa-solid fa-ellipsis"></i>
      </button>
      
      <div id="floatingDrawer" class="floating-drawer">
      
        <button id="playAll" class="drawer-btn">
          <i class="fa-solid fa-play"></i>
        </button>
      
        <button id="fullscreenBtn" class="drawer-btn">
          <i class="fa-solid fa-expand"></i>
        </button>
      
        <button id="toggleSort" class="drawer-btn">
          <i class="fa-solid fa-lock-open"></i>
        </button>
      
      </div>
    </div>
  
    <div id="playNotice" class="PlayNotice">
      <div class="PlayNotice--box">
        <p>
          재생이 시작되면 종료될 때까지 메뉴가 사라집니다.
          <br>
          확인버튼을 누르기 전에 영상 녹화를 준비하시고,
          <br>
          나가려면 뒤로가기 제스처 또는 시스템 버튼을 사용하세요.
        </p>
    
        <button id="playNoticeConfirm" class="btn btn-white">
          확인
        </button>
      </div>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="./js/controller.js"></script>
  <script src="./js/script.js"></script>

</body>

</html>
