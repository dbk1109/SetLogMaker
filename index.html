<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" viewport-fit="cover"/>
  <title>︵‿˚̣̣̣͙⋆⁺𝐦𝐰 𝐬𝐞𝐭 𝐥𝐨𝐠 𝐦𝐚𝐤𝐞𝐫⋆₊˚̣̣̣͙‿︵</title>
  <link rel="stylesheet" href="./css/style.min.css?v=0511"/>
  <!--<link rel="stylesheet" href="./css/mvp3.min.css?v=0511">-->
  <script src="https://kit.fontawesome.com/02bd83a24e.js" crossorigin="anonymous"></script>
</head>

<body>
  <section id="setting">

    <div class="TITLE">
      <h1>︵‿˚̣̣̣͙⋆⁺𝐦𝐰 𝐬𝐞𝐭 𝐥𝐨𝐠 𝐦𝐚𝐤𝐞𝐫⋆₊˚̣̣̣͙‿︵</h1>
      <p>v2.12.1</p>
    </div>
    <div class="SettingWrap">

      <div class="SettingUser">
        <h2>환경 설정</h2>
        <div class="SettingWrap option">
          <label class="option--time">
            <span class="label-text">24시간제로 보기</span>
            <input type="checkbox" id="timeFormatToggle">
            <span class="slider"></span>
          </label>
          <label class="option--title">
            <span class="label-text">타이틀 변경</span>
            <input type="text" name="titleText" id="titleTextChange" placeholder="💚💜">
          </label>
          <label class="option--save">
            <span class="label-text">텍스트/옵션 저장</span>
            <div class="save--btns">
              <button type="button" id="saveDataBtn" class="btn btn-save btn-blueviolet">
                <i class="fa-solid fa-floppy-disk"></i> <span class="save-guidance">기기에 저장</span>
              </button>
              <button id="clearAllBtn" class="btn btn-white">전체삭제</button>
            </div>
          </label>



        </div>
      </div>

      <div class="SettingUser" data-user="user1">
        <h2>USER 1</h2>
        <div class="SettingUser--profile">
          <label for="profile-user1" class="profile-upload">
            + <br>
            프로필
          </label>
          <input type="file" id="profile-user1" class="profile-input" accept="image/*" hidden />
          
          <input type="text" class="nickname-input" placeholder="닉네임 입력" />
          
          <label for="video-user1" class="btn btn-upload btn-blueviolet"> 영상 한번에 추가 </label>
          <input type="file" id="video-user1" class="video-input" accept="video/*" multiple hidden />
        </div>
        <div class="Timeline" id="timeline-user1"></div>
      </div>

      <div class="SettingUser" data-user="user2">
        <h2>USER 2</h2>
        <div class="SettingUser--profile">
          <label for="profile-user2" class="profile-upload">
            + <br>
            프로필
          </label>
          <input type="file" id="profile-user2" class="profile-input" accept="image/*" hidden />
          <input type="text" class="nickname-input" placeholder="닉네임 입력" />
          <label for="video-user2" class="btn btn-upload btn-blueviolet"> 영상 한번에 추가 </label>
          <input type="file" id="video-user2" class="video-input" accept="video/*" multiple hidden />
        </div>
        <div class="Timeline" id="timeline-user2"></div>
      </div>

    </div>

  </section>

  <section id="fullscreenWrap">
    <div id="visual">

      <div class="Menu">
        <div class="Menu--title">
          <div class="Menu--title__left">
            <i class="fa-solid fa-angle-left"></i>
          </div>

          <div class="Menu--title__middle">
            <div class="title--text">
              <p> 💚💜 </p>
              <i class="fa-solid fa-angle-down"></i>
            </div>
          </div>

          <div class="Menu--title__right">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <i class="fa-solid fa-message"></i>
          </div>

        </div>

        <div class="Menu--dots-wrapper">
          <div class="Menu--dots"></div>
        </div>

      </div>

      <div class="Videos">

        <div id="user1" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./image/profile.webp'" />

            <p class="nickname">
              user1
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-solid fa-ellipsis"></i>
          </div>

        </div>

        <div id="user2" class="Videos--users">

          <div class="Videos--users__back"></div>

          <div class="Videos--users__profile">
            <img src="./" onerror="this.src='./image/profile.webp'" />

            <p class="nickname">
              user2
            </p>
          </div>

          <div class="Videos--users__middle">
            <h3></h3>
            <p></p>
          </div>

          <div class="Videos--users__rights">
            <i class="fa-regular fa-heart"></i>
          </div>

        </div>

      </div>

      <div class="Last">
      </div>
      
    </div>
    
    <div class="controller">

      <button id="floatingMenuBtn" class="btn btn-floating-menu">
        <i class="fa-solid fa-ellipsis"></i>
      </button>
      
      <div id="floatingDrawer" class="floating-drawer">
      
        <button id="playAll" class="btn btn-drawer">
          <i class="fa-solid fa-play"></i>
        </button>
      
        <button id="fullscreenBtn" class="btn btn-drawer">
          <i class="fa-solid fa-expand"></i>
        </button>
      
        <button id="toggleSort" class="btn btn-drawer">
          <i class="fa-solid fa-lock-open"></i>
        </button>
      
      </div>
    </div>
  
    <div id="playNotice" class="PlayNotice">
      <div class="PlayNotice--box">
        <i class="fa-solid fa-circle-exclamation"></i>
        <p> 재생이 시작되면 종료될 때까지 메뉴가 사라집니다. </p>
        <p>
          확인버튼을 누르기 전에 영상 녹화를 준비하시고,
          <br>
          나가려면 뒤로가기 제스처 또는 시스템 버튼을 사용하세요.
        </p>
    
        <button id="playNoticeConfirm" class="btn btn-white">
          확인
        </button>
      </div>
    </div>

  </section>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="./js/script.js?v=0511"></script>
  <script src="./js/controller.js?v=0511"></script>

</body>

</html>
